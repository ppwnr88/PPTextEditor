name: Bug report
description: Report something that is broken or behaving unexpectedly in PPText Editor
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce the problem.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Example: macOS 15.4, Windows 11
      placeholder: macOS / Windows version
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Add screenshots, logs, or anything else that may help.
      placeholder: Extra details...
