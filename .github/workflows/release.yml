name: Release Builds

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    name: Release ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles dmg
          - platform: windows-latest
            args: --bundles nsis,msi

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri

      - name: Build and publish bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: PPText Editor ${{ github.ref_name }}
          releaseBody: |
            Desktop installers for PPText Editor.

            Assets:
            - macOS Apple Silicon `.dmg`
            - Windows `.exe` (NSIS)
            - Windows `.msi`
          releaseDraft: false
          prerelease: false
          uploadWorkflowArtifacts: true
          releaseAssetNamePattern: "PPText-Editor-[platform]-[arch][setup][ext]"
          workflowArtifactNamePattern: "release-[platform]-[arch]-[bundle]"
          args: ${{ matrix.args }}
